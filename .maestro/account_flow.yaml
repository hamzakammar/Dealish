appId: com.anonymous.Dealish
name: "Account - Open Panel, View Profile"
tags:
  - requires-auth
---
- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd

# Open account panel
- tapOn:
    id: "account-button"
- waitForAnimationToEnd

# Should see account info
- assertVisible:
    text: ".*@.*"
    optional: true

# Look for settings link
- tapOn:
    text: "Settings"
    optional: true

- pressKey: back
