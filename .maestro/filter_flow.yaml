appId: com.anonymous.Dealish
name: "Filters - Open Panel, Apply, Clear"
tags:
  - requires-auth
---
- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd

# Open filter panel
- tapOn:
    id: "filter-button"
- waitForAnimationToEnd

# Try tapping filter chips
- tapOn:
    text: "Happy Hour"
    optional: true
- tapOn:
    text: "Lunch"
    optional: true

# Close filters
- pressKey: back
