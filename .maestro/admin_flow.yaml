appId: com.anonymous.Dealish
name: "Admin - Dashboard Navigation"
tags:
  - requires-auth
  - requires-admin
---
- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd

# Open account panel
- tapOn:
    id: "account-button"
- waitForAnimationToEnd

# Navigate to admin
- tapOn:
    text: "Admin"
    optional: true
- waitForAnimationToEnd

# Test navigation to Deals
- tapOn:
    text: "Deals"
    optional: true
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

# Test navigation to Inventory
- tapOn:
    text: "Inventory"
    optional: true
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

# Test navigation to Analytics
- tapOn:
    text: "Analytics"
    optional: true
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd

# Test Deal Review
- swipe:
    direction: UP
    duration: 500
- tapOn:
    text: "Review Auto-Detected Deals"
    optional: true
- waitForAnimationToEnd
- pressKey: back

# Go back to map
- pressKey: back
