appId: com.anonymous.Dealish
name: "Admin - Inventory Management"
tags:
  - requires-auth
  - requires-admin
---
- launchApp
- waitForAnimationToEnd

# Navigate to admin → inventory
- tapOn:
    point: "5%,6%"
- tapOn:
    text: "Admin"
    optional: true
- tapOn:
    text: "Inventory"
    optional: true

# Should see inventory list or empty state
- assertVisible:
    text: ".*Inventory.*"
    optional: true

# Try adding a new item
- tapOn:
    id: "add-circle"
    optional: true

# Go back
- pressKey: back
- pressKey: back
