appId: com.anonymous.Dealish
name: "Admin - Deal Review and Edit Before Approve"
tags:
  - requires-auth
  - requires-admin
---
- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd

# Navigate to admin → deal review
- tapOn:
    id: "account-button"
- waitForAnimationToEnd
- tapOn:
    text: "Admin"
    optional: true
- waitForAnimationToEnd
- swipe:
    direction: UP
    duration: 500
- tapOn:
    text: "Review Auto-Detected Deals"
    optional: true
- waitForAnimationToEnd

# Should see deal review screen or queue empty state
- assertVisible:
    text: ".*Deal Review.*|.*Queue is empty.*"
    optional: true

# If there are candidates, try the edit flow
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd

# If edit mode opened, verify fields
- assertVisible:
    text: "Title"
    optional: true

# Cancel edit
- tapOn:
    text: "Cancel"
    optional: true

# Go back
- pressKey: back
- pressKey: back
