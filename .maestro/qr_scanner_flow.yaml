appId: com.anonymous.Dealish
name: "QR Scanner - Merchant Side"
tags:
  - requires-auth
  - requires-admin
---
- launchApp
- waitForAnimationToEnd

# Navigate to admin → QR Scanner
- tapOn:
    point: "5%,6%"
- tapOn:
    text: "Admin"
    optional: true
- tapOn:
    text: "Scan QR"
    optional: true
- tapOn:
    text: "QR"
    optional: true

# QR scanner should request camera permission or show scanner
# On emulator without camera, it might show a permission request
- assertVisible:
    text: ".*camera.*"
    optional: true
- assertVisible:
    text: ".*scan.*"
    optional: true

# Go back
- pressKey: back
