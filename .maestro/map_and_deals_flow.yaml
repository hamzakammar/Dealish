appId: com.anonymous.Dealish
name: "Map - Browse, Search, Toggle Views, Plan Time"
tags:
  - requires-auth
---
- launchApp
- waitForAnimationToEnd
- waitForAnimationToEnd

# Verify map screen
- assertVisible:
    id: "search-bar"

# Test List view
- tapOn:
    id: "toggle-list"
- waitForAnimationToEnd

# Switch back to Map
- tapOn:
    id: "toggle-map"
- waitForAnimationToEnd

# Test search
- tapOn:
    id: "search-input"
- inputText: "Pizza"
- waitForAnimationToEnd

# Clear search
- tapOn:
    id: "close-circle"
    optional: true
- waitForAnimationToEnd

# Test PlanTimeSelector dropdown
- tapOn:
    text: "Now"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Today"
    optional: true
- waitForAnimationToEnd

# Clear plan time
- tapOn:
    id: "clear-plan-time"
    optional: true
