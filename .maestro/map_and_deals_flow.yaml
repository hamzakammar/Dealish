appId: com.hamzakammar.dealish
---
- launchApp
- waitForAnimationToEnd
- assertVisible: "Search"
# Wait for map markers to potentially load
- delay: 2000
# Maestro can tap by text or coordinate. Tapping the search bar to find a known restaurant
- tapOn: "Search"
- inputText: "Cuckoo Cakery"
- tapOn: "Cuckoo Cakery" # Tap the suggestion
- waitForAnimationToEnd
# Verify the detail card slides up
- assertVisible: "Cuckoo Cakery"
- assertVisible: "Claim Deal"
- tapOn: "Claim Deal"
# Verify QR Code appears
- assertVisible: "Scan this QR"
- tapOn: "Done"